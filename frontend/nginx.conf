server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;
    # Serve the compiled React Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This allows React Router to handle page URLs without Nginx throwing a 404
        try_files $uri $uri/ /index.html;
    }

    # Route all API calls directly to the FastAPI Backend container
    location /api/ {
        proxy_pass http://simcore_backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
